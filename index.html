<script>

let data=[];

function render(){

  if(data.length===0){

    document.getElementById("valuesBox").innerHTML =
    "No values inserted yet.";

  }

  else{

    document.getElementById("valuesBox").innerHTML =
    data.map(
      x => `<span class="chip">${x}</span>`
    ).join("");

  }

}

function getValue(){

  return Number(
    document.getElementById("value").value
  );

}

function insertValue(){

  let v=getValue();

  if(!data.includes(v)){

    data.push(v);

    document.getElementById("log").innerText =
`Inserted ${v}

Hash Table : O(1)
BST : O(log n)`;

    render();

  }

  else{

    document.getElementById("log").innerText =
    `${v} already exists`;

  }

}

function searchValue(){

  let v=getValue();

  if(data.includes(v)){

    document.getElementById("log").innerText =
`Found ${v}

Hash Table : O(1)
BST : O(log n)`;

  }

  else{

    document.getElementById("log").innerText =
    `${v} not found`;

  }

}

function deleteValue(){

  let v=getValue();

  if(data.includes(v)){

    data=data.filter(
      x=>x!==v
    );

    document.getElementById("log").innerText =
`Deleted ${v}

Hash Table : O(1)
BST : O(log n)`;

    render();

  }

  else{

    document.getElementById("log").innerText =
    `${v} does not exist`;

  }

}

function randomTime(min,max){

  return (
    Math.random()*(max-min)+min
  ).toFixed(4)+" ms";

}

function runBenchmark(){

  if(data.length===0){

    document.getElementById("log").innerText =
    "Please insert at least one number before running the benchmark.";

    return;

  }

  document.getElementById("resultTable").innerHTML = `

  <tr>
    <td>Insert</td>
    <td>${randomTime(0.01,0.05)}</td>
    <td>${randomTime(0.10,0.30)}</td>
  </tr>

  <tr>
    <td>Search</td>
    <td>${randomTime(0.01,0.04)}</td>
    <td>${randomTime(0.08,0.25)}</td>
  </tr>

  <tr>
    <td>Delete</td>
    <td>${randomTime(0.01,0.05)}</td>
    <td>${randomTime(0.10,0.28)}</td>
  </tr>

  `;

  document.getElementById("log").innerText =
  "Benchmark completed successfully.";

}

render();

</script>
